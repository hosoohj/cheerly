name: CI

on:
  push:
    branches: [main, master, 'sprint*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Backend — Lint + Unit Tests + Integration Tests
  # ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run unit + integration tests
        run: npm run test:run
        env:
          # CI 환경: 실제 AI/Teams 호출 없이 폴백 동작
          ANTHROPIC_API_KEY: ''
          TEAMS_WEBHOOK_URL: ''
          DATABASE_URL: 'file:./test.db'
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2: Frontend — Next.js Build
  # ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: 'file:./build.db'
          ANTHROPIC_API_KEY: ''
          TEAMS_WEBHOOK_URL: ''
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            !.next/cache
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Job 3: E2E Tests (main/master 브랜치 push 시에만)
  # ────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: frontend-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client & seed DB
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed
        env:
          DATABASE_URL: 'file:./e2e-test.db'

      - name: Run E2E tests
        run: npx playwright test
        env:
          DATABASE_URL: 'file:./e2e-test.db'
          ANTHROPIC_API_KEY: ''
          TEAMS_WEBHOOK_URL: ''
          NODE_ENV: test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ────────────────────────────────────────────────────────────
  # Job 4: CI 통과 Badge
  # ────────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: always()
    steps:
      - name: All required jobs passed
        run: |
          if [[ "${{ needs.backend-test.result }}" == "success" && \
                "${{ needs.frontend-build.result }}" == "success" ]]; then
            echo "✅ CI passed"
          else
            echo "❌ CI failed"
            exit 1
          fi
